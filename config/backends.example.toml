# Copy to backends.<HOST_ROLE>.toml and fill in real values.
# HOST_ROLE env var selects which file to load (default: local).
# api_key_env is the name of the env var holding the key — never the key itself.

# --- AI box (HOST_ROLE=local): local GPU, hits LM Studio + Ollama directly ---

[backends.local-small]
kind = "open-ai"
base_url = "http://127.0.0.1:1234/v1"
model = "google/gemma-4-e4b"
api_key_env = ""

[backends.cloud-fast]
kind = "open-ai"
base_url = "http://srv:4000"
model = "claude-sonnet"
api_key_env = "GATEWAY_VKEY"

[backends.cloud-heavy]
# kind: "open-ai" | "claude-code" | "open-code"
# "claude-code" spawns `claude --print --output-format stream-json` as an agentic
#   subprocess; base_url → ANTHROPIC_BASE_URL, api_key_env → ANTHROPIC_AUTH_TOKEN.
kind = "claude-code"
base_url = "http://srv:4000"
model = "claude-opus"
api_key_env = "GATEWAY_VKEY"

# "open-code" spawns `opencode run --format json`. opencode is self-configured
# (provider + baseURL live in ~/.config/opencode), so base_url/api_key_env are
# ignored here; `model` is a provider/model id from `opencode models`.
[backends.opencode-local]
kind = "open-code"
base_url = ""
model = "ollama/qwen3.5:122b"
api_key_env = ""

